<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>다문화 아동 한국어 학습</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#ede9fe,#fce7f3);
  min-height:100vh;
  display:flex;
  justify-content:center;
  padding:20px;
}

:root{
  --purple:#7c3aed;
  --purple-light:#ede9fe;

  --green:#16a34a;
  --green-light:#dcfce7;

  --blue:#2563eb;
  --blue-light:#dbeafe;

  --pink:#db2777;
  --pink-light:#fce7f3;

  --yellow:#d97706;
  --yellow-light:#fef3c7;
}

.screen{
  display:none;
  width:100%;
  max-width:900px;
  background:white;
  border-radius:30px;
  padding:30px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.screen.active{
  display:block;
}

h1{
  text-align:center;
  color:var(--purple);
  font-size:2.2rem;
  font-weight:900;
  margin-bottom:10px;
}

.subtitle{
  text-align:center;
  color:#777;
  margin-bottom:24px;
}

.section-title{
  font-size:1.2rem;
  font-weight:800;
  color:#1e1b4b;
  margin-bottom:12px;
}

.lang-btns{
  display:flex;
  justify-content:center;
  gap:16px;
  margin:24px 0;
  flex-wrap:wrap;
}

.lang-btn{
  border:none;
  border-radius:24px;
  padding:20px 30px;
  font-size:1.1rem;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
  opacity:0.5;
}

.lang-btn.active{
  opacity:1;
  transform:scale(1.08);
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.english{
  background:var(--blue-light);
  color:var(--blue);
}

.russian{
  background:var(--pink-light);
  color:var(--pink);
}

.flag{
  display:block;
  font-size:2rem;
  margin-bottom:8px;
}

input{
  width:100%;
  padding:16px;
  border-radius:20px;
  border:3px solid #e2e8f0;
  margin-top:16px;
  font-size:1rem;
}

.btn-primary{
  background:linear-gradient(135deg,var(--purple),#9333ea);
  color:white;
  border:none;
  padding:16px 30px;
  border-radius:22px;
  font-size:1.1rem;
  font-weight:700;
  cursor:pointer;
  margin-top:20px;
  transition:0.2s;
}

.btn-primary:hover{
  transform:translateY(-2px);
}

.story-box{
  background:var(--purple-light);
  padding:24px;
  border-radius:24px;
  line-height:2;
  color:#3b0764;
  margin-top:20px;
  font-size:1.1rem;
}

.highlight{
  background:var(--yellow-light);
  padding:2px 6px;
  border-radius:8px;
  cursor:pointer;
}

.word-cards{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  margin-top:20px;
}

.word-card{
  flex:1;
  min-width:120px;
  background:white;
  border:3px solid #e2e8f0;
  border-radius:22px;
  padding:18px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}

.word-card:hover{
  border-color:var(--purple);
}

.word-card .emoji{
  font-size:2rem;
}

.word-card .korean{
  font-weight:800;
  margin-top:8px;
}

.read-box{
  background:var(--green-light);
  border-radius:24px;
  padding:24px;
  text-align:center;
  margin-top:24px;
}

.read-text{
  font-size:1.6rem;
  font-weight:900;
  color:#14532d;
  line-height:2;
}

.quiz-question{
  margin-top:30px;
}

.quiz-options{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:12px;
}

.quiz-option{
  background:white;
  border:3px solid #e2e8f0;
  border-radius:18px;
  padding:16px;
  cursor:pointer;
  font-weight:700;
  transition:0.2s;
}

.quiz-option.correct{
  background:var(--green-light);
  border-color:var(--green);
}

.quiz-option.wrong{
  background:#fee2e2;
  border-color:#ef4444;
}

.result{
  text-align:center;
}

.score{
  font-size:3rem;
  color:var(--purple);
  font-weight:900;
  margin:20px 0;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.avatar{
  width:50px;
  height:50px;
  border-radius:50%;
  background:var(--purple);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
}

.coin{
  background:var(--yellow-light);
  padding:10px 16px;
  border-radius:20px;
  font-weight:800;
}

.progress{
  width:100%;
  background:#eee;
  border-radius:20px;
  overflow:hidden;
  height:16px;
  margin-top:16px;
}

.progress-bar{
  height:100%;
  background:linear-gradient(90deg,#7c3aed,#9333ea);
  width:0%;
  transition:0.3s;
}

.emoji-game{
  text-align:center;
  margin-top:30px;
}

.big-emoji{
  font-size:6rem;
  margin:20px 0;
}

.emoji-options{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:20px;
}

.emoji-btn{
  background:white;
  border:3px solid #e2e8f0;
  border-radius:20px;
  padding:18px;
  cursor:pointer;
  font-size:1.1rem;
  font-weight:800;
}

.emoji-btn.correct{
  background:var(--green-light);
  border-color:var(--green);
}

.emoji-btn.wrong{
  background:#fee2e2;
  border-color:#ef4444;
}

</style>
</head>

<body>

<!-- 시작 -->
<div class="screen active" id="screen-welcome">

<div style="text-align:center;font-size:3rem">🌏</div>

<h1>한국어 배우기</h1>

<p class="subtitle">
재미있게 한국어를 배워봐요!
</p>

<div class="section-title">
언어 선택
</div>

<div class="lang-btns">

<button
class="lang-btn english active"
id="btn-en"
onclick="selectLang('en')">

<span class="flag">🇬🇧</span>
English

</button>

<button
class="lang-btn russian"
id="btn-ru"
onclick="selectLang('ru')">

<span class="flag">🇷🇺</span>
Русский

</button>

</div>

<input
id="name-input"
placeholder="이름 입력"
/>

<button
class="btn-primary"
onclick="startProgram()">

시작하기 🚀

</button>

</div>

<!-- 스토리 -->
<div class="screen" id="screen-story">

<div class="top-bar">

<div style="display:flex;gap:10px;align-items:center">

<div class="avatar" id="avatar"></div>

<div id="username"></div>

</div>

<div class="coin" id="score-display">
⭐ 0점 / 100점
</div>

</div>

<div class="progress">
<div class="progress-bar" id="progress-bar"></div>
</div>

<h1>오늘의 동화</h1>

<div class="story-box" id="story-box"></div>

<div class="section-title" style="margin-top:20px">
📚 단어 배우기
</div>

<div class="word-cards" id="word-cards"></div>

<button
class="btn-primary"
onclick="goToScreen('read')">

다음 →

</button>

</div>

<!-- 읽기 -->
<div class="screen" id="screen-read">

<h1>소리 내어 읽기</h1>

<div class="read-box">

<div class="read-text" id="read-text"></div>

<div
id="pronunciation-guide"
style="
margin-top:14px;
font-size:1.1rem;
font-weight:700;
color:#374151;
background:white;
padding:14px;
border-radius:16px;
line-height:1.7;
">
</div>

<button
class="btn-primary"
onclick="speakSentence()">

🔊 듣기

</button>

<button
class="btn-primary"
onclick="startSpeechTest()">

🎤 말하기 테스트

</button>

</div>

<button
class="btn-primary"
onclick="generateQuiz()">

AI 문제 생성 →

</button>

</div>

<!-- 퀴즈 -->
<div class="screen" id="screen-quiz">

<h1>AI 문제</h1>

<div id="quiz-container"></div>

<button
class="btn-primary"
onclick="submitQuiz()">

답 확인하기

</button>

</div>

<!-- 이모지 -->
<div class="screen" id="screen-emoji">

<h1>🎮 이모지 맞추기</h1>

<div class="emoji-game">

<div class="big-emoji" id="emoji-display"></div>

<div class="emoji-options" id="emoji-options"></div>

</div>

</div>

<!-- 결과 -->
<div class="screen" id="screen-result">

<div class="result">

<div style="font-size:4rem">🎉</div>

<h1 id="result-title"></h1>

<div class="score" id="final-score"></div>

<div id="praise-text"></div>

<button
class="btn-primary"
onclick="location.reload()">

다시 시작 🔄

</button>

</div>

</div>

<script>

const STORY = {

title:"토끼와 사과나무",

text:
"옛날에 작은 토끼가 살았어요. 토끼는 매일 학교에 갔어요. 학교 앞에 큰 사과나무가 있었어요. 사과나무에는 빨간 사과가 많았어요. 토끼는 사과를 좋아했어요. 어느 날, 토끼는 친구들과 함께 사과를 먹었어요. 모두 행복했어요.",

sentence:
"토끼는 매일 학교에 갔어요.",

romanized:
"Tokkineun maeil hakgyoe gasseoyo.",

russianPronounce:
"Токкинын мэиль хаккёэ кассоё.",

words:[

{
word:"토끼",
emoji:"🐰",
en:"rabbit",
ru:"кролик"
},

{
word:"사과",
emoji:"🍎",
en:"apple",
ru:"яблоко"
},

{
word:"학교",
emoji:"🏫",
en:"school",
ru:"школа"
},

{
word:"나무",
emoji:"🌳",
en:"tree",
ru:"дерево"
},

{
word:"친구",
emoji:"👫",
en:"friend",
ru:"друг"
},

{
word:"행복",
emoji:"😊",
en:"happy",
ru:"счастливый"
}

]

};

const QUIZ = [

{
q:"이야기의 주인공은 누구예요?",
opts:["토끼","강아지","고양이","곰"],
ans:0
},

{
q:"토끼는 어디에 갔어요?",
opts:["공원","학교","시장","집"],
ans:1
},

{
q:"사과나무는 어디에 있었어요?",
opts:["학교 앞","공원","산","집"],
ans:0
},

{
q:"사과는 무슨 색이었어요?",
opts:["노란색","초록색","빨간색","파란색"],
ans:2
},

{
q:"마지막에 모두 어떤 기분이었어요?",
opts:["슬펐어요","행복했어요","화났어요","무서웠어요"],
ans:1
}

];

let state = {
lang:"en",
name:"",
score:0,
answers:{}
};

let emojiIndex = 0;

function selectLang(lang){

state.lang = lang;

document
.querySelectorAll(".lang-btn")
.forEach(btn=>btn.classList.remove("active"));

if(lang==="en"){
document.getElementById("btn-en").classList.add("active");
}else{
document.getElementById("btn-ru").classList.add("active");
}

}

function startProgram(){

const name =
document.getElementById("name-input").value.trim();

if(!name){

alert("이름을 입력해주세요!");
return;

}

state.name = name;

document.getElementById("avatar").textContent = name[0];
document.getElementById("username").textContent = name;

initStory();

goToScreen("story");

}

function goToScreen(name){

document.querySelectorAll(".screen")
.forEach(s=>s.classList.remove("active"));

document.getElementById("screen-"+name)
.classList.add("active");

window.scrollTo(0,0);

}

function initStory(){

let text = STORY.text;

STORY.words.forEach(w=>{

text = text.replaceAll(
w.word,
`<span class="highlight"
onclick="speakWord('${w.word}')">
${w.word}
</span>`
);

});

document.getElementById("story-box").innerHTML = text;

const cards = document.getElementById("word-cards");

cards.innerHTML = "";

STORY.words.forEach(w=>{

const trans =
state.lang==="en"
? w.en
: w.ru;

cards.innerHTML += `

<div class="word-card"
onclick="speakWord('${w.word}')">

<div class="emoji">${w.emoji}</div>

<div class="korean">${w.word}</div>

<div>${trans}</div>

</div>

`;

});

document.getElementById("read-text")
.textContent = STORY.sentence;

const guide =
document.getElementById("pronunciation-guide");

if(state.lang==="en"){

guide.innerHTML =
`🇬🇧 Romanization<br>
${STORY.romanized}`;

}else{

guide.innerHTML =
`🇷🇺 Русское произношение<br>
${STORY.russianPronounce}`;

}

}

function speakWord(word){

const utter =
new SpeechSynthesisUtterance(word);

utter.lang = "ko-KR";

speechSynthesis.speak(utter);

}

function speakSentence(){

const utter =
new SpeechSynthesisUtterance(STORY.sentence);

utter.lang = "ko-KR";
utter.rate = 0.8;

speechSynthesis.speak(utter);

}

function startSpeechTest(){

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!SpeechRecognition){

alert("브라우저 미지원 😢");
return;

}

const recognition =
new SpeechRecognition();

recognition.lang = "ko-KR";

alert("문장을 읽어보세요!");

recognition.start();

recognition.onresult = function(event){

const spoken =
event.results[0][0].transcript.trim();

const cleanTarget =
STORY.sentence.replace(/\s/g,"");

const cleanSpoken =
spoken.replace(/\s/g,"");

let message =
`🗣 인식된 문장:\n"${spoken}"\n\n`;

if(
cleanSpoken.includes("학교") ||
cleanSpoken === cleanTarget
){

if(state.lang==="en"){
message += "✅ Correct! Great job! 🌟";
}else{
message += "✅ Правильно! Отличная работа! 🌟";
}

state.score += 20;

updateScore();

}else{

if(state.lang==="en"){
message += "❌ Try again slowly 😊";
}else{
message += "❌ Попробуй ещё раз медленно 😊";
}

}

alert(message);

};

}

function updateScore(){

document.getElementById("score-display")
.textContent =
`⭐ ${state.score}점 / 100점`;

document.getElementById("progress-bar")
.style.width =
state.score + "%";

}

function generateQuiz(){

goToScreen("quiz");

renderQuiz();

}

function renderQuiz(){

const container =
document.getElementById("quiz-container");

container.innerHTML = "";

QUIZ.forEach((q,index)=>{

container.innerHTML += `

<div class="quiz-question">

<div class="section-title">
${index+1}. ${q.q}
</div>

<div class="quiz-options">

${q.opts.map((opt,i)=>

`
<button
class="quiz-option"
onclick="selectAnswer(${index},${i},this)">
${opt}
</button>
`

).join("")}

</div>

</div>

`;

});

}

function selectAnswer(q,a,btn){

state.answers[q] = a;

document.querySelectorAll(
`.quiz-question:nth-child(${q+1}) .quiz-option`
)
.forEach(b=>{

b.style.borderColor = "#e2e8f0";
b.style.background = "white";

});

btn.style.borderColor = "#7c3aed";
btn.style.background = "#ede9fe";

}

function submitQuiz(){

QUIZ.forEach((q,index)=>{

const user =
state.answers[index];

const buttons =
document.querySelectorAll(
`.quiz-question:nth-child(${index+1}) .quiz-option`
);

buttons.forEach((b,i)=>{

b.disabled = true;

if(i===q.ans){

b.classList.add("correct");

}
else if(i===user){

b.classList.add("wrong");

}

});

if(user===q.ans){

state.score += 8;

}

});

updateScore();

setTimeout(()=>{

startEmojiGame();

goToScreen("emoji");

},1500);

}

function startEmojiGame(){

emojiIndex = 0;

showEmojiQuestion();

}

function showEmojiQuestion(){

if(emojiIndex >= STORY.words.length){

showResult();
return;

}

const current =
STORY.words[emojiIndex];

document.getElementById("emoji-display")
.textContent = current.emoji;

const options =
shuffle([
current.word,
...shuffle(STORY.words
.filter(w=>w.word!==current.word))
.slice(0,3)
.map(w=>w.word)
]);

document.getElementById("emoji-options")
.innerHTML = options.map(opt=>`

<button
class="emoji-btn"
onclick="selectEmojiAnswer('${opt}','${current.word}',this)">

${opt}

</button>

`).join("");

}

function selectEmojiAnswer(selected,correct,btn){

const buttons =
document.querySelectorAll(".emoji-btn");

buttons.forEach(b=>b.disabled=true);

if(selected===correct){

btn.classList.add("correct");

state.score += 5;

}else{

btn.classList.add("wrong");

buttons.forEach(b=>{
if(b.textContent===correct){
b.classList.add("correct");
}
});

}

updateScore();

emojiIndex++;

setTimeout(showEmojiQuestion,1200);

}

function showResult(){

goToScreen("result");

let titleText = "";
let praiseText = "";

if(state.lang==="en"){

titleText =
state.name +
", great job! Please get checked by the teacher.";

if(state.score >= 80){

praiseText =
"You did amazing today! 😊";

}else if(state.score >= 50){

praiseText =
"Great work! Let's practice a little more 🌟";

}else{

praiseText =
"You worked hard today! 💪";

}

}else{

titleText =
state.name +
", отличная работа! Пожалуйста, покажите результат учителю.";

if(state.score >= 80){

praiseText =
"Сегодня ты справился отлично! 😊";

}else if(state.score >= 50){

praiseText =
"Очень хорошо! Давай потренируемся ещё немного 🌟";

}else{

praiseText =
"Ты хорошо старался сегодня! 💪";

}

}

document.getElementById("result-title")
.textContent = titleText;

document.getElementById("final-score")
.textContent =
state.score + "점 / 100점";

document.getElementById("praise-text")
.textContent =
praiseText;

}

function shuffle(arr){

return [...arr]
.sort(()=>Math.random()-0.5);

}

</script>

</body>
</html>
